<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Porquim IA - Controle Financeiro</title>

<!-- Firebase SDK -->
<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
    }
  }
</script>

<style>
:root { 
--bg-overlay: rgba(248,250,252,0.88); 
--card:#ffffff; 
--text:#1e293b; 
--primary:#3b82f6; 
--income:#10b981; 
--expense:#ef4444; 
--border:#e2e8f0; 
}

body{
font-family:Inter,sans-serif;
color:var(--text);
margin:0;
padding:20px;
display:flex;
justify-content:center;
min-height:100vh;
background-color:#f8fafc;
background-image:linear-gradient(var(--bg-overlay),var(--bg-overlay)),url('https://images.unsplash.com/photo-1620714223084-8fcacc6dfd8d?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.container{
width:100%;
max-width:500px;
box-shadow:0 10px 25px -5px rgba(0,0,0,0.1);
background:rgba(255,255,255,0.6);
border-radius:16px;
padding:20px;
backdrop-filter:blur(8px);
}

/* Estilos de Login */
.login-container {
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    padding: 30px 20px;
}

.login-header {
    text-align: center;
    margin-bottom: 30px;
}

.login-header h1 {
    font-size: 2rem;
    color: #1e3a8a;
    margin: 0 0 10px 0;
}

.login-header p {
    color: #64748b;
    font-size: 0.9rem;
}

.input-group {
    margin-bottom: 20px;
}

.input-group label {
    display: block;
    margin-bottom: 8px;
    color: #334155;
    font-weight: 500;
    font-size: 0.9rem;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 1rem;
    transition: border-color 0.3s;
    box-sizing: border-box;
}

.input-group input:focus {
    outline: none;
    border-color: #3b82f6;
}

.btn-login {
    background: linear-gradient(135deg, #3b82f6, #1e3a8a);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
    transition: transform 0.2s;
}

.btn-login:active {
    transform: scale(0.98);
}

.btn-secondary {
    background: #f1f5f9;
    color: #475569;
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-size: 0.9rem;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
}

.error-message {
    background: #fee;
    color: #c33;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 14px;
    text-align: center;
    display: none;
}

.success-message {
    background: #e8f5e9;
    color: #2e7d32;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 14px;
    text-align: center;
    display: none;
}

/* Dashboard Header */
.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid var(--border);
    flex-wrap: wrap;
    gap: 10px;
}

.user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 0.85rem;
}

.logout-btn {
    background: #ef4444;
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
}

.sync-status {
    background: #e8f5e9;
    color: #2e7d32;
    padding: 8px;
    border-radius: 8px;
    text-align: center;
    font-size: 0.8rem;
    margin-bottom: 15px;
    display: none;
}

.online-status {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 12px;
    background: #10b981;
    color: white;
}

header{text-align:center;margin-bottom:25px;}

h1{
font-size:1.8rem;
color:#1e3a8a;
margin:0;
font-weight:800;
}

.summary{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:25px;
}

.card{
background:var(--card);
padding:15px;
border-radius:12px;
border:1px solid var(--border);
}

.card.full{
grid-column:1/-1;
border-top:4px solid var(--primary);
}

.card label{
font-size:.7rem;
text-transform:uppercase;
color:#64748b;
font-weight:700;
}

.card p{
margin:5px 0 0;
font-size:1.3rem;
font-weight:800;
}

.form-group{
background:var(--card);
padding:20px;
border-radius:12px;
margin-bottom:25px;
border:1px solid var(--border);
}

input,select,button{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid var(--border);
border-radius:8px;
box-sizing:border-box;
font-size:1rem;
}

.row{
display:flex;
gap:10px;
}

button{
background:var(--primary);
color:white;
border:none;
font-weight:700;
cursor:pointer;
transition: all 0.2s;
}

button:hover {
    opacity: 0.9;
}

.actions{
display:flex;
gap:6px;
}

.actions button{
background:#f1f5f9;
color:#475569;
width:auto;
padding:6px 8px;
font-size:14px;
}

.list-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
flex-wrap: wrap;
gap: 10px;
}

.report-buttons {
    display: flex;
    gap: 10px;
    margin: 10px 0;
}

.report-buttons button {
    flex: 1;
    background: #f1f5f9;
    color: #475569;
    font-size: 14px;
    padding: 10px;
}

.report-buttons button.active {
    background: var(--primary);
    color: white;
}

.day-group{
background:#f1f5f9;
padding:8px 12px;
border-radius:8px;
margin:25px 0 10px 0;
display:flex;
justify-content:space-between;
border:1px solid var(--border);
}

.transaction-item{
background:var(--card);
padding:15px;
border-radius:10px;
margin-bottom:8px;
display:flex;
align-items:center;
border-left:5px solid #ddd;
transition: all 0.2s;
}

.transaction-item:hover {
    transform: translateX(2px);
}

.item-income{border-left-color:var(--income);}
.item-expense{border-left-color:var(--expense);}

.info{flex:1;}

.info-details {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.payment-method {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
}

.payment-pix {
    background: #e8f5e9;
    color: #2e7d32;
}

.payment-card {
    background: #e3f2fd;
    color: #1565c0;
}

.payment-cash {
    background: #fff3e0;
    color: #e65100;
}

.value{
font-weight:800;
margin-right:10px;
}

.dashboard-content {
    display: none;
}

@media (max-width: 480px) {
    .row {
        flex-direction: column;
    }
    
    .dashboard-header {
        flex-direction: column;
    }
    
    .user-info {
        width: 100%;
        justify-content: center;
    }
    
    .logout-btn {
        width: 100%;
    }
    
    .report-buttons {
        flex-direction: column;
    }
}

/* Animação de entrada */
@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.transaction-item {
    animation: slideIn 0.3s ease-out;
}
</style>
</head>

<body>

<div class="container" id="app">
    <!-- Tela de Login -->
    <div id="loginScreen">
        <div class="login-container">
            <div class="login-header">
                <h1>🐷 Porquim IA</h1>
                <p>Faça login para acessar seus dados</p>
                <p style="font-size: 0.8rem; color: #94a3b8;">✓ Sincronização em tempo real</p>
                <p style="font-size: 0.8rem; color: #94a3b8;">✓ Acesse de qualquer dispositivo</p>
            </div>
            
            <div id="loginError" class="error-message"></div>
            
            <div class="input-group">
                <label>📧 E-mail</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com">
            </div>
            
            <div class="input-group">
                <label>🔒 Senha</label>
                <input type="password" id="loginPassword" placeholder="******">
            </div>
            
            <button class="btn-login" onclick="login()">Entrar</button>
            <button class="btn-secondary" onclick="showRegister()">Criar nova conta</button>
        </div>
    </div>

    <!-- Tela de Registro -->
    <div id="registerScreen" style="display: none;">
        <div class="login-container">
            <div class="login-header">
                <h1>🐷 Criar Conta</h1>
                <p>Seus dados serão salvos na nuvem</p>
            </div>
            
            <div id="registerError" class="error-message"></div>
            <div id="registerSuccess" class="success-message"></div>
            
            <div class="input-group">
                <label>📧 E-mail</label>
                <input type="email" id="regEmail" placeholder="seu@email.com">
            </div>
            
            <div class="input-group">
                <label>🔒 Senha</label>
                <input type="password" id="regPassword" placeholder="******">
            </div>
            
            <div class="input-group">
                <label>🔒 Confirmar Senha</label>
                <input type="password" id="regConfirmPassword" placeholder="******">
            </div>
            
            <button class="btn-login" onclick="register()">Criar Conta</button>
            <button class="btn-secondary" onclick="showLogin()">Voltar para login</button>
        </div>
    </div>

    <!-- Dashboard Principal -->
    <div id="dashboardContent" class="dashboard-content">
        <div class="dashboard-header">
            <div class="user-info">
                <span>👤</span>
                <span id="userEmailDisplay"></span>
                <span id="onlineStatus" class="online-status">● Online</span>
            </div>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>
        
        <div id="syncStatus" class="sync-status">
            🔄 Sincronizado em tempo real
        </div>
        
        <header>
            <h1>🐷 Porquim IA</h1>
        </header>

        <div class="summary">
            <div class="card full">
                <label>Saldo no Período</label>
                <p id="total-balance">R$ 0,00</p>
            </div>
            <div class="card">
                <label style="color:var(--income)">Entradas</label>
                <p style="color:var(--income)" id="total-income">R$ 0,00</p>
            </div>
            <div class="card">
                <label style="color:var(--expense)">Saídas</label>
                <p style="color:var(--expense)" id="total-expense">R$ 0,00</p>
            </div>
        </div>

        <!-- Botões de Relatório -->
        <div class="report-buttons">
            <button id="btnSemanal" onclick="setReportType('semanal')" class="active">📅 Semanal</button>
            <button id="btnMensal" onclick="setReportType('mensal')">📆 Mensal</button>
        </div>

        <div class="form-group">
            <input type="text" id="desc" placeholder="Descrição" oninput="this.value=this.value.replace(/[^a-zA-ZÀ-ÿ0-9\s]/g,'')">
            
            <input type="text" id="amount" placeholder="Valor (ex: 15,00)" oninput="this.value=this.value.replace(/[^0-9,]/g,'')">
            
            <select id="paymentMethod">
                <option value="Dinheiro">💵 Dinheiro</option>
                <option value="Pix">📱 Pix</option>
                <option value="Cartão">💳 Cartão</option>
            </select>
            
            <input type="date" id="date">
            
            <div class="row">
                <select id="category">
                    <option value="Venda">Venda 💰</option>
                    <option value="Reposição">Reposição de Estoque</option>
                    <option value="Alimentação">Alimentação</option>
                    <option value="Lazer">Lazer</option>
                    <option value="Salário">Salário</option>
                    <option value="Casa">Casa</option>
                    <option value="Outros">Outros</option>
                </select>
                <select id="type">
                    <option value="entrada">Entrada 📥</option>
                    <option value="saida">Saída 📤</option>
                </select>
            </div>
            <button onclick="saveTransaction()">Adicionar ao Porquim</button>
        </div>

        <div class="list-header">
            <strong>Histórico</strong>
            <input type="month" id="month-filter" onchange="renderUI()" style="display: none;">
            <input type="week" id="week-filter" onchange="renderUI()">
        </div>

        <button onclick="relatorioCompleto()">📊 Gerar Relatório Completo</button>

        <div id="transaction-list"></div>
    </div>
</div>

<script type="module">
    // ========== SUAS CONFIGURAÇÕES DO FIREBASE ==========
    const firebaseConfig = {
      apiKey: "AIzaSyCVDcfHgaJo97SmAk0eKpEL3kn1VXX6oTc",
      authDomain: "porquim-ia.firebaseapp.com",
      databaseURL: "https://porquim-ia-default-rtdb.firebaseio.com",
      projectId: "porquim-ia",
      storageBucket: "porquim-ia.firebasestorage.app",
      messagingSenderId: "713625983072",
      appId: "1:713625983072:web:87a5f48447cec7cc374b05",
      measurementId: "G-NXRK4W5YHY"
    };
    
    // Importar Firebase
    import { initializeApp } from "firebase/app";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";
    import { getDatabase, ref, onValue, set, push, remove, update } from "firebase/database";
    
    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);
    
    // Variáveis globais
    let currentUser = null;
    let transactions = [];
    let unsubscribeTransactions = null;
    let currentReportType = 'semanal';
    
    // Referências DOM
    const loginScreen = document.getElementById('loginScreen');
    const registerScreen = document.getElementById('registerScreen');
    const dashboardContent = document.getElementById('dashboardContent');
    const syncStatus = document.getElementById('syncStatus');
    const onlineStatus = document.getElementById('onlineStatus');
    
    function showError(elementId, message) {
        const errorDiv = document.getElementById(elementId);
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 3000);
    }
    
    function showSuccess(elementId, message) {
        const successDiv = document.getElementById(elementId);
        successDiv.textContent = message;
        successDiv.style.display = 'block';
        setTimeout(() => {
            successDiv.style.display = 'none';
        }, 2000);
    }
    
    function showSyncMessage(message, isError = false) {
        syncStatus.textContent = message;
        syncStatus.style.display = 'block';
        syncStatus.style.background = isError ? '#ffebee' : '#e8f5e9';
        syncStatus.style.color = isError ? '#c62828' : '#2e7d32';
        
        setTimeout(() => {
            syncStatus.style.display = 'none';
        }, 2000);
    }
    
    function setReportType(type) {
        currentReportType = type;
        
        document.getElementById('btnSemanal').classList.remove('active');
        document.getElementById('btnMensal').classList.remove('active');
        
        if (type === 'semanal') {
            document.getElementById('btnSemanal').classList.add('active');
            document.getElementById('week-filter').style.display = 'block';
            document.getElementById('month-filter').style.display = 'none';
            const today = new Date();
            const year = today.getFullYear();
            const weekNumber = getWeekNumber(today);
            document.getElementById('week-filter').value = `${year}-W${weekNumber.toString().padStart(2, '0')}`;
        } else {
            document.getElementById('btnMensal').classList.add('active');
            document.getElementById('week-filter').style.display = 'none';
            document.getElementById('month-filter').style.display = 'block';
            const today = new Date();
            document.getElementById('month-filter').value = today.toISOString().substring(0, 7);
        }
        
        renderUI();
    }
    
    function getWeekNumber(date) {
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }
    
    function loadTransactionsRealtime(userId) {
        if (unsubscribeTransactions) {
            unsubscribeTransactions();
        }
        
        const transactionsRef = ref(database, `users/${userId}/transactions`);
        
        unsubscribeTransactions = onValue(transactionsRef, (snapshot) => {
            const data = snapshot.val();
            let newTransactions = [];
            
            if (data) {
                newTransactions = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                }));
                newTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            }
            
            transactions = newTransactions;
            renderUI();
            showSyncMessage('✓ Dados sincronizados');
        }, (error) => {
            console.error('Erro ao carregar dados:', error);
            showSyncMessage('Erro na sincronização', true);
        });
    }
    
    async function saveTransactionToFirebase(transaction) {
        if (!currentUser) return;
        
        const transactionsRef = ref(database, `users/${currentUser.uid}/transactions`);
        const newTransactionRef = push(transactionsRef);
        await set(newTransactionRef, transaction);
        return newTransactionRef.key;
    }
    
    async function deleteTransactionFromFirebase(transactionId) {
        if (!currentUser) return;
        
        const transactionRef = ref(database, `users/${currentUser.uid}/transactions/${transactionId}`);
        await remove(transactionRef);
    }
    
    function parseValue(val) {
        if (!val) return 0;
        let clean = val.replace(/[^\d,]/g, '').replace(',', '.');
        return parseFloat(clean) || 0;
    }
    
    async function saveTransaction() {
        const desc = document.getElementById('desc').value;
        const amount = parseValue(document.getElementById('amount').value);
        const date = document.getElementById('date').value;
        const category = document.getElementById('category').value;
        const type = document.getElementById('type').value;
        const paymentMethod = document.getElementById('paymentMethod').value;
        
        if (!desc || amount <= 0 || !date) {
            alert("Preencha todos os campos!");
            return;
        }
        
        const newTransaction = {
            desc,
            amount,
            date,
            category,
            type,
            paymentMethod,
            createdAt: Date.now()
        };
        
        try {
            await saveTransactionToFirebase(newTransaction);
            showSyncMessage('✅ Venda registrada!');
            
            document.getElementById('desc').value = "";
            document.getElementById('amount').value = "";
            document.getElementById('date').valueAsDate = new Date();
        } catch (error) {
            console.error('Erro ao salvar:', error);
            alert('Erro ao salvar. Tente novamente.');
        }
    }
    
    async function deleteTransaction(id) {
        if (!confirm("Deseja excluir esta transação?")) return;
        
        try {
            await deleteTransactionFromFirebase(id);
            showSyncMessage('🗑️ Transação excluída!');
        } catch (error) {
            console.error('Erro ao deletar:', error);
            alert('Erro ao deletar. Tente novamente.');
        }
    }
    
    async function editTransaction(id) {
        const t = transactions.find(tr => tr.id == id);
        
        document.getElementById('desc').value = t.desc;
        document.getElementById('amount').value = t.amount.toString().replace('.', ',');
        document.getElementById('date').value = t.date;
        document.getElementById('category').value = t.category;
        document.getElementById('type').value = t.type;
        document.getElementById('paymentMethod').value = t.paymentMethod || 'Dinheiro';
        
        try {
            await deleteTransactionFromFirebase(id);
            showSyncMessage('✏️ Edite e salve a transação');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (error) {
            console.error('Erro ao editar:', error);
            alert('Erro ao editar. Tente novamente.');
        }
    }
    
    function relatorioCompleto() {
        if (currentReportType === 'semanal') {
            relatorioSemanal();
        } else {
            relatorioMensal();
        }
    }
    
    function relatorioSemanal() {
        const filterVal = document.getElementById('week-filter').value;
        if (!filterVal) return;
        
        const [year, weekStr] = filterVal.split('-W');
        const week = parseInt(weekStr);
        
        const firstDayOfWeek = getDateOfISOWeek(week, year);
        const lastDayOfWeek = new Date(firstDayOfWeek);
        lastDayOfWeek.setDate(firstDayOfWeek.getDate() + 6);
        
        const startDate = firstDayOfWeek.toISOString().split('T')[0];
        const endDate = lastDayOfWeek.toISOString().split('T')[0];
        
        let totalIncome = 0;
        let totalExpense = 0;
        let pixTotal = 0;
        let cardTotal = 0;
        let cashTotal = 0;
        
        transactions.forEach(t => {
            if (t.date >= startDate && t.date <= endDate) {
                if (t.type === "entrada") {
                    totalIncome += t.amount;
                    if (t.paymentMethod === 'Pix') pixTotal += t.amount;
                    else if (t.paymentMethod === 'Cartão') cardTotal += t.amount;
                    else if (t.paymentMethod === 'Dinheiro') cashTotal += t.amount;
                } else {
                    totalExpense += t.amount;
                }
            }
        });
        
        alert(`📊 RELATÓRIO SEMANAL
📅 Semana: ${startDate.split('-').reverse().join('/')} a ${endDate.split('-').reverse().join('/')}

💰 ENTRADAS: R$ ${totalIncome.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
📤 SAÍDAS: R$ ${totalExpense.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
💵 SALDO: R$ ${(totalIncome - totalExpense).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}

💳 FORMAS DE PAGAMENTO:
📱 Pix: R$ ${pixTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
💳 Cartão: R$ ${cardTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
💵 Dinheiro: R$ ${cashTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`);
    }
    
    function getDateOfISOWeek(week, year) {
        const simple = new Date(year, 0, 1 + (week - 1) * 7);
        const dow = simple.getDay();
        const weekStart = simple;
        if (dow <= 4) {
            weekStart.setDate(simple.getDate() - simple.getDay() + 1);
        } else {
            weekStart.setDate(simple.getDate() + 8 - simple.getDay());
        }
        return weekStart;
    }
    
    function relatorioMensal() {
        const filterVal = document.getElementById('month-filter').value;
        
        let totalIncome = 0;
        let totalExpense = 0;
        let bestDay = "";
        let bestValue = 0;
        let worstDay = "";
        let worstValue = 0;
        let pixTotal = 0;
        let cardTotal = 0;
        let cashTotal = 0;
        const grouped = {};
        
        transactions
            .filter(t => t.date.startsWith(filterVal))
            .forEach(t => {
                if (!grouped[t.date]) {
                    grouped[t.date] = { income: 0, expense: 0 };
                }
                if (t.type === "entrada") {
                    totalIncome += t.amount;
                    grouped[t.date].income += t.amount;
                    if (t.paymentMethod === 'Pix') pixTotal += t.amount;
                    else if (t.paymentMethod === 'Cartão') cardTotal += t.amount;
                    else if (t.paymentMethod === 'Dinheiro') cashTotal += t.amount;
                } else {
                    totalExpense += t.amount;
                    grouped[t.date].expense += t.amount;
                }
            });
        
        Object.keys(grouped).forEach(date => {
            if (grouped[date].income > bestValue) {
                bestValue = grouped[date].income;
                bestDay = date;
            }
            if (grouped[date].expense > worstValue) {
                worstValue = grouped[date].expense;
                worstDay = date;
            }
        });
        
        alert(`📊 RELATÓRIO MENSAL - ${filterVal.split('-').reverse().join('/')}

💰 ENTRADAS: R$ ${totalIncome.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
📤 SAÍDAS: R$ ${totalExpense.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
💵 SALDO: R$ ${(totalIncome - totalExpense).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}

💳 FORMAS DE PAGAMENTO:
📱 Pix: R$ ${pixTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
💳 Cartão: R$ ${cardTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
💵 Dinheiro: R$ ${cashTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}

🔥 Melhor dia de vendas:
${bestDay ? bestDay.split('-').reverse().join('/') : "Nenhum"} (R$ ${bestValue.toLocaleString('pt-BR', { minimumFractionDigits: 2 })})

💸 Dia que mais gastou:
${worstDay ? worstDay.split('-').reverse().join('/') : "Nenhum"} (R$ ${worstValue.toLocaleString('pt-BR', { minimumFractionDigits: 2 })})`);
    }
    
    function renderUI() {
        const list = document.getElementById('transaction-list');
        
        if (!list) return;
        
        let filterVal;
        if (currentReportType === 'semanal') {
            filterVal = document.getElementById('week-filter').value;
            if (!filterVal) return;
        } else {
            filterVal = document.getElementById('month-filter').value;
            if (!filterVal) return;
        }
        
        let filtered = [];
        if (currentReportType === 'semanal') {
            const [year, weekStr] = filterVal.split('-W');
            const week = parseInt(weekStr);
            const firstDayOfWeek = getDateOfISOWeek(week, year);
            const lastDayOfWeek = new Date(firstDayOfWeek);
            lastDayOfWeek.setDate(firstDayOfWeek.getDate() + 6);
            
            const startDate = firstDayOfWeek.toISOString().split('T')[0];
            const endDate = lastDayOfWeek.toISOString().split('T')[0];
            
            filtered = transactions.filter(t => t.date >= startDate && t.date <= endDate);
        } else {
            filtered = transactions.filter(t => t.date.startsWith(filterVal));
        }
        
        // Agrupar por data
        const grouped = {};
        filtered.forEach(t => {
            if (!grouped[t.date]) {
                grouped[t.date] = { items: [], dayIncome: 0, dayExpense: 0 };
            }
            grouped[t.date].items.push(t);
            if (t.type === "entrada") {
                grouped[t.date].dayIncome += t.amount;
            } else {
                grouped[t.date].dayExpense += t.amount;
            }
        });
        
        // Ordenar datas decrescente (mais recente primeiro)
        const sortedDates = Object.keys(grouped).sort((a, b) => new Date(b) - new Date(a));
        
        // Construir HTML
        let html = '';
        let totalIncome = 0;
        let totalExpense = 0;
        
        sortedDates.forEach(date => {
            const data = grouped[date];
            const dayBalance = data.dayIncome - data.dayExpense;
            const dateBr = date.split('-').reverse().join('/');
            
            // Calcular totais gerais
            totalIncome += data.dayIncome;
            totalExpense += data.dayExpense;
            
            // Cabeçalho do dia
            html += `
                <div class="day-group">
                    <strong>📅 ${dateBr}</strong>
                    <span style="color:${dayBalance >= 0 ? 'green' : 'red'}">
                        Saldo: R$ ${dayBalance.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                    </span>
                </div>
            `;
            
            // Separar itens por tipo dentro do dia: primeiro entradas, depois saídas
            const entradasDoDia = data.items.filter(t => t.type === "entrada");
            const saidasDoDia = data.items.filter(t => t.type === "saida");
            
            // Renderizar entradas (verde)
            entradasDoDia.forEach(t => {
                const paymentHtml = t.paymentMethod ? 
                    `<span class="payment-method ${t.paymentMethod === 'Pix' ? 'payment-pix' : (t.paymentMethod === 'Cartão' ? 'payment-card' : 'payment-cash')}">
                        ${t.paymentMethod === 'Pix' ? '📱' : (t.paymentMethod === 'Cartão' ? '💳' : '💵')} ${t.paymentMethod}
                     </span>` : '';
                html += `
                    <div class="transaction-item item-income">
                        <div class="info">
                            <strong>${t.desc}</strong>
                            <div class="info-details">
                                <span>${t.category}</span>
                                ${paymentHtml}
                            </div>
                        </div>
                        <div class="value" style="color:green">
                            + R$ ${t.amount.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                        </div>
                        <div class="actions">
                            <button onclick="window.editTransaction('${t.id}')">✏️</button>
                            <button onclick="window.deleteTransaction('${t.id}')">🗑️</button>
                        </div>
                    </div>
                `;
            });
            
            // Renderizar saídas (vermelho)
            saidasDoDia.forEach(t => {
                const paymentHtml = t.paymentMethod ? 
                    `<span class="payment-method ${t.paymentMethod === 'Pix' ? 'payment-pix' : (t.paymentMethod === 'Cartão' ? 'payment-card' : 'payment-cash')}">
                        ${t.paymentMethod === 'Pix' ? '📱' : (t.paymentMethod === 'Cartão' ? '💳' : '💵')} ${t.paymentMethod}
                     </span>` : '';
                html += `
                    <div class="transaction-item item-expense">
                        <div class="info">
                            <strong>${t.desc}</strong>
                            <div class="info-details">
                                <span>${t.category}</span>
                                ${paymentHtml}
                            </div>
                        </div>
                        <div class="value" style="color:red">
                            - R$ ${t.amount.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                        </div>
                        <div class="actions">
                            <button onclick="window.editTransaction('${t.id}')">✏️</button>
                            <button onclick="window.deleteTransaction('${t.id}')">🗑️</button>
                        </div>
                    </div>
                `;
            });
        });
        
        // Se não houver transações
        if (sortedDates.length === 0) {
            html = '<div style="text-align:center; padding:40px; color:#999;">Nenhuma transação neste período</div>';
        }
        
        list.innerHTML = html;
        
        // Atualizar cards
        document.getElementById('total-balance').innerText = `R$ ${(totalIncome - totalExpense).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        document.getElementById('total-income').innerText = `R$ ${totalIncome.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        document.getElementById('total-expense').innerText = `R$ ${totalExpense.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
    }
    
    async function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            showError('loginError', 'Preencha todos os campos!');
            return;
        }
        
        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            console.log('Login realizado:', userCredential.user.email);
        } catch (error) {
            console.error('Erro no login:', error);
            if (error.code === 'auth/user-not-found') {
                showError('loginError', 'Usuário não encontrado!');
            } else if (error.code === 'auth/wrong-password') {
                showError('loginError', 'Senha incorreta!');
            } else {
                showError('loginError', 'Erro ao fazer login. Tente novamente.');
            }
        }
    }
    
    async function register() {
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;
        
        if (!email || !password) {
            showError('registerError', 'Preencha todos os campos!');
            return;
        }
        
        if (password !== confirmPassword) {
            showError('registerError', 'As senhas não coincidem!');
            return;
        }
        
        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            console.log('Usuário criado:', userCredential.user.email);
            
            showSuccess('registerSuccess', 'Conta criada com sucesso! Redirecionando...');
            
            setTimeout(() => {
                showLogin();
            }, 2000);
        } catch (error) {
            console.error('Erro no registro:', error);
            if (error.code === 'auth/email-already-in-use') {
                showError('registerError', 'E-mail já cadastrado!');
            } else if (error.code === 'auth/weak-password') {
                showError('registerError', 'Senha muito fraca! Use pelo menos 6 caracteres.');
            } else {
                showError('registerError', 'Erro ao criar conta. Tente novamente.');
            }
        }
    }
    
    function logout() {
        signOut(auth);
    }
    
    function showRegister() {
        loginScreen.style.display = 'none';
        registerScreen.style.display = 'block';
    }
    
    function showLogin() {
        registerScreen.style.display = 'none';
        loginScreen.style.display = 'block';
    }
    
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loginScreen.style.display = 'none';
            registerScreen.style.display = 'none';
            dashboardContent.style.display = 'block';
            document.getElementById('userEmailDisplay').innerHTML = `📧 ${user.email}`;
            onlineStatus.style.display = 'inline-block';
            
            const today = new Date();
            document.getElementById('month-filter').value = today.toISOString().substring(0, 7);
            
            const year = today.getFullYear();
            const weekNumber = getWeekNumber(today);
            document.getElementById('week-filter').value = `${year}-W${weekNumber.toString().padStart(2, '0')}`;
            document.getElementById('date').valueAsDate = today;
            
            loadTransactionsRealtime(user.uid);
        } else {
            if (unsubscribeTransactions) {
                unsubscribeTransactions();
                unsubscribeTransactions = null;
            }
            currentUser = null;
            transactions = [];
            dashboardContent.style.display = 'none';
            loginScreen.style.display = 'block';
            registerScreen.style.display = 'none';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }
    });
    
    window.login = login;
    window.register = register;
    window.logout = logout;
    window.showRegister = showRegister;
    window.showLogin = showLogin;
    window.saveTransaction = saveTransaction;
    window.deleteTransaction = deleteTransaction;
    window.editTransaction = editTransaction;
    window.relatorioCompleto = relatorioCompleto;
    window.relatorioSemanal = relatorioSemanal;
    window.relatorioMensal = relatorioMensal;
    window.setReportType = setReportType;
    window.renderUI = renderUI;
    
    console.log('🔥 Sistema Porquim IA conectado ao Firebase!');
</script>
