<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flowly</title>

<style>

:root{
--bg:#121212;
--card:#1e1e1e;
--venda:#22c55e;
--gasto:#ef4444;
--gray:#9ca3af;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:var(--bg);
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
}

header{
text-align:center;
font-size:50px;
font-weight:bold;
color:white;
margin-bottom:30px;
}

form{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

input,select,button{
padding:12px;
border-radius:10px;
border:none;
font-size:14px;
}

input,select{
flex:1;
background:#1f1f1f;
color:white;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#confirmEdit{
display:none;
background:#3b82f6;
width:100%;
}

.summary{
display:flex;
gap:10px;
margin-bottom:20px;
}

.card{
flex:1;
background:var(--card);
padding:15px;
border-radius:12px;
text-align:center;
}

.card h3{
color:var(--gray);
font-size:14px;
}

.card span{
color:white;
font-size:20px;
font-weight:bold;
}

.day{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
color:var(--gray);
margin-top:25px;
margin-bottom:10px;
font-size:15px;
font-weight:bold;
}

.transaction{
background:var(--card);
border-radius:12px;
padding:15px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.desc{
color:white;
font-weight:bold;
}

.amount{
font-weight:bold;
}

.venda .amount{
color:var(--venda);
}

.gasto .amount{
color:var(--gasto);
}

.actions{
display:flex;
gap:10px;
}

.icon{
cursor:pointer;
}

.report{
margin-top:20px;
}

#relatorio{
margin-top:20px;
background:#1e1e1e;
padding:20px;
border-radius:12px;
color:white;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<header>Flowly</header>

<form id="form">

<input id="desc" placeholder="Descrição" required pattern="[A-Za-zÀ-ÿ ]+">

<input id="amount" type="number" min="0" step="0.01" placeholder="Valor" required>

<select id="category">
<option value="venda">Venda</option>
<option value="gasto">Gasto</option>
</select>

<input type="date" id="date" required>

<button type="submit">Adicionar</button>

<button type="button" id="confirmEdit">Confirmar edição</button>

</form>

<div class="summary">

<div class="card">
<h3>Saldo</h3>
<span id="saldo">0</span>
</div>

<div class="card">
<h3>Total Venda</h3>
<span id="vendas">0</span>
</div>

<div class="card">
<h3>Total Gasto</h3>
<span id="gastos">0</span>
</div>

</div>

<div class="report">

<input type="month" id="month">

<button onclick="mostrarRelatorio()">Ver Relatório</button>

<button onclick="compartilharRelatorio()">📤 Compartilhar Relatório</button>

</div>

<div id="lista"></div>

<div id="relatorio"></div>

</div>

<script>

let dados=JSON.parse(localStorage.getItem("flowly"))||[]

let editIndex=null

document.getElementById("date").value=new Date().toISOString().split("T")[0]

function salvar(){
localStorage.setItem("flowly",JSON.stringify(dados))
}

function render(){

let lista=document.getElementById("lista")

lista.innerHTML=""

let saldo=0
let vendas=0
let gastos=0

dados.sort((a,b)=>new Date(a.data)-new Date(b.data))

let ultimoDia=""

dados.forEach((t,i)=>{

if(t.data!==ultimoDia){

let day=document.createElement("div")
day.className="day"
day.innerHTML="📅 "+new Date(t.data).toLocaleDateString("pt-BR")

lista.appendChild(day)

ultimoDia=t.data

}

saldo+=t.tipo=="venda"?t.valor:-t.valor

if(t.tipo=="venda")vendas+=t.valor
else gastos+=t.valor

let div=document.createElement("div")

div.className="transaction "+t.tipo

div.innerHTML=`

<div class="desc">${t.desc}</div>

<div class="amount">
${t.tipo=="venda"?"+":"-"} R$ ${t.valor.toFixed(2)}
</div>

<div class="actions">

<span class="icon" onclick="editar(${i})">✏</span>
<span class="icon" onclick="deletar(${i})">🗑</span>

</div>

`

lista.appendChild(div)

})

document.getElementById("saldo").innerText=saldo.toFixed(2)
document.getElementById("vendas").innerText=vendas.toFixed(2)
document.getElementById("gastos").innerText=gastos.toFixed(2)

salvar()

}

document.getElementById("form").addEventListener("submit",e=>{

e.preventDefault()

let desc=document.getElementById("desc").value
let valor=parseFloat(document.getElementById("amount").value)
let tipo=document.getElementById("category").value
let data=document.getElementById("date").value

if(editIndex!==null){

dados[editIndex]={desc,valor,tipo,data}

editIndex=null

document.getElementById("confirmEdit").style.display="none"

}else{

dados.push({desc,valor,tipo,data})

}

render()

e.target.reset()

document.getElementById("date").value=new Date().toISOString().split("T")[0]

})

function editar(i){

let t=dados[i]

desc.value=t.desc
amount.value=t.valor
category.value=t.tipo
date.value=t.data

editIndex=i

confirmEdit.style.display="block"

}

confirmEdit.onclick=function(){

let desc=document.getElementById("desc").value
let valor=parseFloat(document.getElementById("amount").value)
let tipo=document.getElementById("category").value
let data=document.getElementById("date").value

dados[editIndex]={desc,valor,tipo,data}

editIndex=null

this.style.display="none"

render()

}

function deletar(i){

if(confirm("Excluir registro?")){

dados.splice(i,1)

render()

}

}

function mostrarRelatorio(){

let mes=month.value

if(!mes){
alert("Escolha um mês")
return
}

let vendas=0
let gastos=0

let vendasPorDia={}
let gastosPorDia={}

dados
.filter(t=>t.data.startsWith(mes))
.forEach(t=>{

if(t.tipo=="venda"){

vendas+=t.valor

if(!vendasPorDia[t.data])vendasPorDia[t.data]=0
vendasPorDia[t.data]+=t.valor

}else{

gastos+=t.valor

if(!gastosPorDia[t.data])gastosPorDia[t.data]=0
gastosPorDia[t.data]+=t.valor

}

})

let saldo=vendas-gastos

let melhorDia="-"
let maiorVenda=0

for(let d in vendasPorDia){
if(vendasPorDia[d]>maiorVenda){
maiorVenda=vendasPorDia[d]
melhorDia=d
}
}

let piorDia="-"
let maiorGasto=0

for(let d in gastosPorDia){
if(gastosPorDia[d]>maiorGasto){
maiorGasto=gastosPorDia[d]
piorDia=d
}
}

if(melhorDia!="-")melhorDia=new Date(melhorDia).toLocaleDateString("pt-BR")
if(piorDia!="-")piorDia=new Date(piorDia).toLocaleDateString("pt-BR")

let nomeMes=new Date(mes+"-01").toLocaleDateString("pt-BR",{month:"long",year:"numeric"})

relatorio.innerHTML=`

<h2>📊 Relatório do mês</h2>

<p><b>${nomeMes}</b></p>

<br>

<p>💰 Total de vendas: <span style="color:#22c55e">R$ ${vendas.toFixed(2)}</span></p>

<p>💸 Total de gastos: <span style="color:#ef4444">R$ ${gastos.toFixed(2)}</span></p>

<br>

<p>📈 Melhor dia de vendas: <b>${melhorDia}</b></p>

<p>📉 Dia que mais gastou: <b>${piorDia}</b></p>

<br>

<p><b>Saldo final: R$ ${saldo.toFixed(2)}</b></p>

`

}

function compartilharRelatorio(){

let texto=relatorio.innerText

if(!texto){
alert("Gere o relatório primeiro")
return
}

if(navigator.share){

navigator.share({
title:"Relatório Flowly",
text:texto
})

}else{

navigator.clipboard.writeText(texto)

alert("Relatório copiado!")

}

}

render()

</script>

</body>

</html>
