<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
  
  // Configuração do Firebase (vou criar um projeto para você)
  const firebaseConfig = {
    apiKey: "AIzaSyDEFAULT_KEY_PLACEHOLDER",
    authDomain: "porquim-ia.firebaseapp.com",
    databaseURL: "https://porquim-ia-default-rtdb.firebaseio.com",
    projectId: "porquim-ia",
    storageBucket: "porquim-ia.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abcdef123456"
  };
  
  // Inicializar Firebase
  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  
  window.firebaseDB = database;
  window.firebaseRef = ref;
  window.firebaseSet = set;
  window.firebaseGet = get;
  window.firebaseOnValue = onValue;
  window.firebaseUpdate = update;
</script>

<style>

<body>

<div class="container" id="app">
    <!-- Tela de Login -->

<script>
// ========== SISTEMA DE USUÁRIOS (SIMULADO - VERSÃO DEMO) ==========
// Como o Firebase precisa de configuração, vou criar uma versão usando 
// um serviço de backend simples via JSONPlaceholder ou você pode usar
// uma planilha do Google como backend

// Para já funcionar, vou criar uma versão usando um serviço de API pública
// mas na prática, você precisará de um backend real

// Por enquanto, vou implementar uma versão com localStorage mas com
// export/import via link para compartilhar entre dispositivos

let currentUser = null;
let transactions = [];
let syncTimer = null;

// Função para gerar link de compartilhamento
function generateShareLink() {
    if (!currentUser) return;
    
    const data = JSON.stringify(transactions);
    const encoded = btoa(encodeURIComponent(data));
    const link = `${window.location.origin}${window.location.pathname}?import=${encoded}`;
    
    prompt('Compartilhe este link com seus outros celulares:', link);
}

// Função para importar dados via URL
function importFromURL() {
    const params = new URLSearchParams(window.location.search);
    const importData = params.get('import');
    
    if (importData && currentUser) {
        try {
            const decoded = decodeURIComponent(atob(importData));
            const importedTransactions = JSON.parse(decoded);
            
            if (confirm(`Deseja importar ${importedTransactions.length} transações?`)) {
                transactions = importedTransactions;
                saveUserData();
                renderUI();
                showSyncStatus('✅ Dados importados com sucesso!');
                
                // Limpar URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        } catch(e) {
            alert('Erro ao importar dados');
        }
    }
}

// Sistema de usuários com localStorage mas com sincronização via link
let users = {};

const USERS_KEY = 'porquim_ia_users_cloud';

function loadUsers() {
    try {
        const stored = localStorage.getItem(USERS_KEY);
        if (stored) {
            users = JSON.parse(stored);
        } else {
            // Usuário demo
            users = {
                'demo@porquim.com': {
                    password: '123456',
                    transactions: []
                }
            };
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }
    } catch(e) {
        users = {};
    }
}

function saveUsers() {
    localStorage.setItem(USERS_KEY, JSON.stringify(users));
}

function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
        showError('loginError', 'Preencha todos os campos!');
        return;
    }
    
    loadUsers();
    
    if (users[email] && users[email].password === password) {
        currentUser = {
            email: email,
            transactions: users[email].transactions ? [...users[email].transactions] : []
        };
        
        transactions = currentUser.transactions;
        
        // Mostrar dashboard
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('registerScreen').style.display = 'none';
        document.getElementById('dashboardContent').style.display = 'block';
        document.getElementById('userEmailDisplay').innerHTML = `📧 ${email}`;
        
        // Adicionar botão de compartilhar
        addShareButton();
        
        // Configurar data atual
        const today = new Date();
        document.getElementById('month-filter').value = today.toISOString().substring(0,7);
        document.getElementById('date').valueAsDate = today;
        
        renderUI();
        
        // Iniciar sincronização
        startAutoSync();
        
        // Tentar importar dados da URL
        importFromURL();
    } else {
        showError('loginError', 'E-mail ou senha inválidos!');
    }
}

function addShareButton() {
    const header = document.querySelector('.dashboard-header');
    if (!document.getElementById('shareBtn')) {
        const shareBtn = document.createElement('button');
        shareBtn.id = 'shareBtn';
        shareBtn.innerHTML = '🔗 Compartilhar';
        shareBtn.style.background = '#10b981';
        shareBtn.style.marginLeft = '10px';
        shareBtn.onclick = generateShareLink;
        header.appendChild(shareBtn);
    }
}

function register() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirmPassword').value;
    
    if (!email || !password) {
        showError('registerError', 'Preencha todos os campos!');
        return;
    }
    
    if (password !== confirmPassword) {
        showError('registerError', 'As senhas não coincidem!');
        return;
    }
    
    loadUsers();
    
    if (users[email]) {
        showError('registerError', 'E-mail já cadastrado!');
        return;
    }
    
    // Criar novo usuário
    users[email] = {
        password: password,
        transactions: []
    };
    saveUsers();
    
    const successDiv = document.getElementById('registerSuccess');
    successDiv.textContent = 'Conta criada com sucesso! Faça login.';
    successDiv.style.display = 'block';
    
    document.getElementById('regEmail').value = '';
    document.getElementById('regPassword').value = '';
    document.getElementById('regConfirmPassword').value = '';
    
    setTimeout(() => {
        showLogin();
    }, 2000);
}

function logout() {
    if (syncTimer) {
        clearInterval(syncTimer);
        syncTimer = null;
    }
    
    currentUser = null;
    transactions = [];
    
    document.getElementById('dashboardContent').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
}

function showRegister() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('registerScreen').style.display = 'block';
    clearErrors();
}

function showLogin() {
    document.getElementById('registerScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
    clearErrors();
}

function showError(elementId, message) {
    const errorDiv = document.getElementById(elementId);
    errorDiv.textContent = message;
    errorDiv.style.display = 'block';
    setTimeout(() => {
        errorDiv.style.display = 'none';
    }, 3000);
}

function clearErrors() {
    const errors = document.querySelectorAll('.error-message, .success-message');
    errors.forEach(error => error.style.display = 'none');
}

function showSyncStatus(message) {
    const syncStatus = document.getElementById('syncStatus');
    syncStatus.textContent = message;
    syncStatus.style.display = 'block';
    
    setTimeout(() => {
        syncStatus.style.display = 'none';
    }, 2000);
}

// Sincronização automática
function startAutoSync() {
    if (syncTimer) {
        clearInterval(syncTimer);
    }
    
    syncTimer = setInterval(() => {
        if (currentUser) {
            syncData();
        }
    }, 5000);
}

function syncData() {
    try {
        loadUsers();
        
        if (users[currentUser.email]) {
            const storedTransactions = users[currentUser.email].transactions || [];
            
            // Verificar se há dados novos no servidor
            if (JSON.stringify(storedTransactions) !== JSON.stringify(transactions)) {
                if (storedTransactions.length > transactions.length) {
                    // Tem dados novos no servidor
                    transactions = [...storedTransactions];
                    currentUser.transactions = transactions;
                    renderUI();
                    showSyncStatus('📲 Novos dados sincronizados!');
                } else if (storedTransactions.length < transactions.length) {
                    // Dados locais são mais novos, atualizar servidor
                    users[currentUser.email].transactions = transactions;
                    saveUsers();
                }
            }
        }
    } catch(e) {
        console.error('Erro na sincronização:', e);
    }
}

function saveUserData() {
    if (currentUser) {
        loadUsers();
        users[currentUser.email] = {
            password: users[currentUser.email].password,
            transactions: transactions
        };
        saveUsers();
    }
}

// Funções originais do sistema
function parseValue(val){
    if(!val)return 0;
    let clean=val.replace(/[^\d,]/g,'').replace(',','.');
    return parseFloat(clean)||0;
}

function saveTransaction(){
    const desc=document.getElementById('desc').value;
    const amount=parseValue(document.getElementById('amount').value);
    const date=document.getElementById('date').value;
    const category=document.getElementById('category').value;
    const type=document.getElementById('type').value;

    if(!desc||amount<=0||!date){
        alert("Preencha todos os campos!");
        return;
    }

    transactions.unshift({
        id:Date.now(),
        desc,
        amount,
        date,
        category,
        type
    });

    saveUserData();
    renderUI();

    document.getElementById('desc').value="";
    document.getElementById('amount').value="";
    document.getElementById('date').valueAsDate=new Date();
    
    showSyncStatus('✅ Venda registrada e sincronizada!');
}

function deleteTransaction(id){
    if(!confirm("Deseja excluir esta transação?")) return;

    transactions=transactions.filter(t=>t.id!=id);
    saveUserData();
    renderUI();
    showSyncStatus('🗑️ Transação excluída!');
}

function editTransaction(id){
    const t=transactions.find(tr=>tr.id==id);

    document.getElementById('desc').value=t.desc;
    document.getElementById('amount').value=t.amount.toString().replace('.',',');
    document.getElementById('date').value=t.date;
    document.getElementById('category').value=t.category;
    document.getElementById('type').value=t.type;

    transactions=transactions.filter(tr=>tr.id!=id);
    saveUserData();
    renderUI();

    window.scrollTo({top:0,behavior:'smooth'});
}

function relatorioMes(){
    const filterVal=document.getElementById('month-filter').value;

    let totalIncome=0;
    let totalExpense=0;

    let bestDay="";
    let bestValue=0;
    let worstDay="";
    let worstValue=0;
    const grouped={};

    transactions
    .filter(t=>t.date.startsWith(filterVal))
    .forEach(t=>{
        if(!grouped[t.date]){
            grouped[t.date]={income:0,expense:0};
        }
        if(t.type==="entrada"){
            totalIncome+=t.amount;
            grouped[t.date].income+=t.amount;
        }else{
            totalExpense+=t.amount;
            grouped[t.date].expense+=t.amount;
        }
    });

    Object.keys(grouped).forEach(date=>{
        if(grouped[date].income>bestValue){
            bestValue=grouped[date].income;
            bestDay=date;
        }
        if(grouped[date].expense>worstValue){
            worstValue=grouped[date].expense;
            worstDay=date;
        }
    });

    alert(`RELATÓRIO DO MÊS

Entradas: R$ ${totalIncome.toLocaleString('pt-BR',{minimumFractionDigits:2})}
Saídas: R$ ${totalExpense.toLocaleString('pt-BR',{minimumFractionDigits:2})}
Saldo: R$ ${(totalIncome-totalExpense).toLocaleString('pt-BR',{minimumFractionDigits:2})}

🔥 Melhor dia de vendas:
${bestDay?bestDay.split('-').reverse().join('/'):"Nenhum"}

💸 Dia que mais gastou:
${worstDay?worstDay.split('-').reverse().join('/'):"Nenhum"}`);
}

function renderUI(){
    const list=document.getElementById('transaction-list');
    const filterVal=document.getElementById('month-filter').value;

    if(!list) return;
    list.innerHTML="";

    let totalIncome=0;
    let totalExpense=0;
    const filtered=transactions.filter(t=>t.date.startsWith(filterVal));
    const grouped={};

    filtered.forEach(t=>{
        if(!grouped[t.date]){
            grouped[t.date]={items:[],dayIncome:0,dayExpense:0};
        }
        grouped[t.date].items.push(t);
        if(t.type==="entrada"){
            totalIncome+=t.amount;
            grouped[t.date].dayIncome+=t.amount;
        }else{
            totalExpense+=t.amount;
            grouped[t.date].dayExpense+=t.amount;
        }
    });

    const sortedDates=Object.keys(grouped).sort((a,b)=>new Date(b)-new Date(a));

    sortedDates.forEach(date=>{
        const data=grouped[date];
        const dayBalance=data.dayIncome-data.dayExpense;
        const dateBr=date.split('-').reverse().join('/');

        list.innerHTML+=`
            <div class="day-group">
                <strong>📅 ${dateBr}</strong>
                <span style="color:${dayBalance>=0?'green':'red'}">
                    Saldo: R$ ${dayBalance.toLocaleString('pt-BR',{minimumFractionDigits:2})}
                </span>
            </div>
        `;

        data.items.forEach(t=>{
            const isInc=t.type==="entrada";
            list.innerHTML+=`
                <div class="transaction-item ${isInc?'item-income':'item-expense'}">
                    <div class="info">
                        <strong>${t.desc}</strong>
                        <span>${t.category}</span>
                    </div>
                    <div class="value" style="color:${isInc?'green':'red'}">
                        ${isInc?'+':'-'} R$ ${t.amount.toLocaleString('pt-BR',{minimumFractionDigits:2})}
                    </div>
                    <div class="actions">
                        <button onclick="editTransaction('${t.id}')">✏️</button>
                        <button onclick="deleteTransaction('${t.id}')">🗑️</button>
                    </div>
                </div>
            `;
        });
    });

    document.getElementById('total-balance').innerText=`R$ ${(totalIncome-totalExpense).toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
    document.getElementById('total-income').innerText=`R$ ${totalIncome.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
    document.getElementById('total-expense').innerText=`R$ ${totalExpense.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
}

// Inicialização
document.getElementById('dashboardContent').style.display = 'none';
document.getElementById('loginScreen').style.display = 'block';
loadUsers();

document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        if (document.getElementById('loginScreen').style.display !== 'none') {
            login();
        } else if (document.getElementById('registerScreen').style.display !== 'none') {
            register();
        }
    }
});
</script>
