<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porquim IA</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--primary:#3b82f6;
--income:#10b981;
--expense:#ef4444;
--border:#e2e8f0;
}

body{
font-family:Arial;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:white;
padding:25px;
border-radius:15px;
width:100%;
max-width:450px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.page{display:none}
.page.active{display:block}

input,select,button{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid var(--border);
}

button{
background:var(--primary);
color:white;
font-weight:bold;
cursor:pointer;
}

.balance{
padding:15px;
border-radius:10px;
background:#f8fafc;
margin-bottom:15px;
}

.transaction{
padding:10px;
margin-bottom:6px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
background:#f8fafc;
}

.income{border-left:4px solid var(--income)}
.expense{border-left:4px solid var(--expense)}

.delete{
background:var(--expense);
padding:5px 8px;
font-size:12px;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div id="page-login" class="page active">

<h2>🐷 Porquim IA</h2>

<input type="email" id="login-email" placeholder="Email">
<input type="password" id="login-pass" placeholder="Senha">

<button onclick="handleLogin()">Entrar</button>

<button onclick="showPage('page-register')">Criar conta</button>

</div>

<div id="page-register" class="page">

<h2>Criar Conta</h2>

<input type="text" id="reg-name" placeholder="Nome">
<input type="email" id="reg-email" placeholder="Email">
<input type="password" id="reg-pass" placeholder="Senha">

<button onclick="handleRegister()">Cadastrar</button>

<button onclick="showPage('page-login')">Voltar</button>

</div>

<div id="page-app" class="page">

<h3>Olá <span id="display-name"></span></h3>

<button onclick="logout()">Sair</button>

<div class="balance">

<b>Saldo:</b> R$ <span id="saldo">0</span><br>

<span style="color:green">Entradas: R$ <span id="entradas">0</span></span><br>

<span style="color:red">Saídas: R$ <span id="saidas">0</span></span>

</div>

<input type="text" id="desc" placeholder="Descrição">

<input type="number" id="amount" placeholder="Valor">

<input type="date" id="date">

<select id="type">
<option value="entrada">Entrada</option>
<option value="saida">Saída</option>
</select>

<button onclick="saveTransaction()">Salvar</button>

<hr>

<div id="transaction-list"></div>

</div>

</div>

<script>

const supabaseUrl="https://rvvyuapnmkblzfrzyjbd.supabase.co"

const supabaseKey="SUA_KEY_AQUI"

const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey)

let currentUser=null
let transactions=[]

function showPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

}

async function handleRegister(){

const name=document.getElementById("reg-name").value
const email=document.getElementById("reg-email").value
const pass=document.getElementById("reg-pass").value

if(!name||!email||!pass){
alert("Preencha tudo")
return
}

const {error}=await supabaseClient
.from("usuarios")
.insert([{name,email,pass}])

if(error){

alert("Erro ao cadastrar")

}else{

alert("Conta criada")

showPage("page-login")

}

}

async function handleLogin(){

const email=document.getElementById("login-email").value
const pass=document.getElementById("login-pass").value

const {data,error}=await supabaseClient
.from("usuarios")
.select("*")
.eq("email",email)
.eq("pass",pass)
.single()

if(error||!data){

alert("Login inválido")

}else{

currentUser=data

localStorage.setItem("userEmail",data.email)

initApp()

}

}

function logout(){

localStorage.removeItem("userEmail")

currentUser=null

showPage("page-login")

}

async function initApp(){

document.getElementById("display-name").innerText=currentUser.name

document.getElementById("date").valueAsDate=new Date()

showPage("page-app")

loadTransactions()

}

async function saveTransaction(){

const desc=document.getElementById("desc").value
const amount=parseFloat(document.getElementById("amount").value)
const date=document.getElementById("date").value
const type=document.getElementById("type").value

if(!desc||!amount||!date){
alert("Dados inválidos")
return
}

await supabaseClient
.from("transacoes")
.insert([{

email:currentUser.email,
descricao:desc,
amount,
date,
type

}])

document.getElementById("desc").value=""
document.getElementById("amount").value=""

loadTransactions()

}

async function deleteTransaction(id){

await supabaseClient
.from("transacoes")
.delete()
.eq("id",id)

loadTransactions()

}

async function loadTransactions(){

const {data}=await supabaseClient
.from("transacoes")
.select("*")
.eq("email",currentUser.email)

transactions=data||[]

renderUI()

}

function renderUI(){

const list=document.getElementById("transaction-list")

let entradas=0
let saidas=0

list.innerHTML=""

transactions.forEach(t=>{

if(t.type=="entrada") entradas+=t.amount
if(t.type=="saida") saidas+=t.amount

const div=document.createElement("div")

div.className="transaction "+(t.type=="entrada"?"income":"expense")

div.innerHTML=`

<span>${t.descricao} - R$ ${t.amount}</span>

<button class="delete" onclick="deleteTransaction(${t.id})">X</button>

`

list.appendChild(div)

})

document.getElementById("entradas").innerText=entradas.toFixed(2)

document.getElementById("saidas").innerText=saidas.toFixed(2)

document.getElementById("saldo").innerText=(entradas-saidas).toFixed(2)

}

window.onload=async()=>{

const email=localStorage.getItem("userEmail")

if(email){

const {data}=await supabaseClient
.from("usuarios")
.select("*")
.eq("email",email)
.single()

if(data){

currentUser=data

initApp()

}

}

}

</script>

</body>
</html>
