<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porquim IA - Controle Financeiro para Loja</title>

<style>

:root { 
--bg-overlay: rgba(248,250,252,0.88); 
--card:#ffffff; 
--text:#1e293b; 
--primary:#3b82f6; 
--income:#10b981; 
--expense:#ef4444; 
--border:#e2e8f0; 
}

body{
font-family:Inter,sans-serif;
color:var(--text);
margin:0;
padding:20px;
display:flex;
justify-content:center;
min-height:100vh;
background-color:#f8fafc;
background-image:linear-gradient(var(--bg-overlay),var(--bg-overlay)),url('https://images.unsplash.com/photo-1620714223084-8fcacc6dfd8d?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.container{
width:100%;
max-width:500px;
box-shadow:0 10px 25px -5px rgba(0,0,0,0.1);
background:rgba(255,255,255,0.6);
border-radius:16px;
padding:20px;
backdrop-filter:blur(8px);
}

header{text-align:center;margin-bottom:25px;}

h1{
font-size:1.8rem;
color:#1e3a8a;
margin:0;
font-weight:800;
}

.summary{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:25px;
}

.card{
background:var(--card);
padding:15px;
border-radius:12px;
border:1px solid var(--border);
}

.card.full{
grid-column:1/-1;
border-top:4px solid var(--primary);
}

.card label{
font-size:.7rem;
text-transform:uppercase;
color:#64748b;
font-weight:700;
}

.card p{
margin:5px 0 0;
font-size:1.3rem;
font-weight:800;
}

.form-group{
background:var(--card);
padding:20px;
border-radius:12px;
margin-bottom:25px;
border:1px solid var(--border);
}

input,select,button{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid var(--border);
border-radius:8px;
box-sizing:border-box;
font-size:1rem;
}

.row{
display:flex;
gap:10px;
}

button{
background:var(--primary);
color:white;
border:none;
font-weight:700;
cursor:pointer;
}

button.cancel{
background:#94a3b8;
}

.list-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.top-buttons{
display:flex;
gap:10px;
margin-bottom:15px;
}

.top-buttons button{
font-size:.9rem;
padding:8px;
}

.day-group{
background:#f1f5f9;
padding:8px 12px;
border-radius:8px;
margin:25px 0 10px 0;
display:flex;
justify-content:space-between;
border:1px solid var(--border);
}

.day-total{
font-weight:800;
font-size:.9rem;
}

.transaction-item{
background:var(--card);
padding:15px;
border-radius:10px;
margin-bottom:8px;
display:flex;
align-items:center;
border-left:5px solid #ddd;
}

.item-income{border-left-color:var(--income);}
.item-expense{border-left-color:var(--expense);}

.info{flex:1;}

.value{
font-weight:800;
margin-right:15px;
}

.actions{
display:flex;
gap:8px;
}

.actions button{
width:auto;
padding:6px 10px;
background:#f1f5f9;
color:#475569;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>🐷 Porquim IA</h1>
</header>

<div class="summary">

<div class="card full">
<label>Saldo no Mês</label>
<p id="total-balance">R$ 0,00</p>
</div>

<div class="card">
<label style="color:var(--income)">Entradas</label>
<p style="color:var(--income)" id="total-income">R$ 0,00</p>
</div>

<div class="card">
<label style="color:var(--expense)">Saídas</label>
<p style="color:var(--expense)" id="total-expense">R$ 0,00</p>
</div>

</div>

<div class="form-group">

<input type="text" id="desc" placeholder="Descrição">

<div class="row">
<input type="text" id="amount" placeholder="Valor (ex: 15,00)">
<input type="date" id="date">
</div>

<div class="row">

<select id="category">
<option value="Venda">Venda 💰</option>
<option value="Reposição">Reposição de Estoque</option>
<option value="Alimentação">Alimentação</option>
<option value="Lazer">Lazer</option>
<option value="Salário">Salário</option>
<option value="Casa">Casa</option>
<option value="Outros">Outros</option>
</select>

<select id="type">
<option value="entrada">Entrada 📥</option>
<option value="saida">Saída 📤</option>
</select>

</div>

<button onclick="saveTransaction()">Adicionar ao Porquim</button>

</div>

<div class="list-header">

<strong>Histórico Diário</strong>

<input type="month" id="month-filter" onchange="renderUI()">

</div>

<div class="top-buttons">

<button onclick="abrirMes()">📅 Selecionar Mês</button>

<button onclick="relatorioMes()">📊 Relatório do Mês</button>

</div>

<div id="transaction-list"></div>

</div>

<script>

let transactions=[];

try{
transactions=JSON.parse(localStorage.getItem('porquim_ia_db'))||[];
}catch(e){transactions=[];}

const today=new Date();

document.getElementById('month-filter').value=today.toISOString().substring(0,7);
document.getElementById('date').valueAsDate=today;

function parseValue(val){
if(!val)return 0;
let clean=val.replace(/[^\d,]/g,'').replace(',','.');
return parseFloat(clean)||0;
}

function saveTransaction(){

const desc=document.getElementById('desc').value;
const amount=parseValue(document.getElementById('amount').value);
const date=document.getElementById('date').value;
const category=document.getElementById('category').value;
const type=document.getElementById('type').value;

if(!desc||amount<=0||!date){
alert("Preencha todos os campos!");
return;
}

transactions.push({
id:Date.now(),
desc,
amount,
date,
category,
type
});

localStorage.setItem('porquim_ia_db',JSON.stringify(transactions));

renderUI();

}

function abrirMes(){
document.getElementById("month-filter").showPicker();
}

function relatorioMes(){

const filterVal=document.getElementById('month-filter').value;

let totalIncome=0;
let totalExpense=0;

let grouped={};

transactions
.filter(t=>t.date.startsWith(filterVal))
.forEach(t=>{

if(!grouped[t.date]){
grouped[t.date]={income:0,expense:0};
}

if(t.type==="entrada"){
totalIncome+=t.amount;
grouped[t.date].income+=t.amount;
}else{
totalExpense+=t.amount;
grouped[t.date].expense+=t.amount;
}

});

let bestDay="";
let bestValue=0;

let worstDay="";
let worstValue=0;

Object.keys(grouped).forEach(date=>{

const inc=grouped[date].income;
const exp=grouped[date].expense;

if(inc>bestValue){
bestValue=inc;
bestDay=date;
}

if(exp>worstValue){
worstValue=exp;
worstDay=date;
}

});

alert(`🐷 RELATÓRIO DO MÊS

Entradas: R$ ${totalIncome.toLocaleString('pt-BR',{minimumFractionDigits:2})}

Saídas: R$ ${totalExpense.toLocaleString('pt-BR',{minimumFractionDigits:2})}

Saldo: R$ ${(totalIncome-totalExpense).toLocaleString('pt-BR',{minimumFractionDigits:2})}

🔥 Melhor dia de vendas:
${bestDay?bestDay.split('-').reverse().join('/'):"Nenhum"}

💸 Dia que mais gastou:
${worstDay?worstDay.split('-').reverse().join('/'):"Nenhum"}
`);

}

function renderUI(){

const list=document.getElementById('transaction-list');
const filterVal=document.getElementById('month-filter').value;

list.innerHTML="";

let totalIncome=0;
let totalExpense=0;

const filtered=transactions.filter(t=>t.date.startsWith(filterVal));

const grouped={};

filtered.forEach(t=>{

if(!grouped[t.date]){
grouped[t.date]={items:[],dayIncome:0,dayExpense:0};
}

grouped[t.date].items.push(t);

if(t.type==="entrada"){
totalIncome+=t.amount;
grouped[t.date].dayIncome+=t.amount;
}else{
totalExpense+=t.amount;
grouped[t.date].dayExpense+=t.amount;
}

});

const sortedDates=Object.keys(grouped).sort((a,b)=>new Date(b)-new Date(a));

sortedDates.forEach(date=>{

const data=grouped[date];
const dayBalance=data.dayIncome-data.dayExpense;
const dateBr=date.split('-').reverse().join('/');

list.innerHTML+=`

<div class="day-group">

<strong>📅 ${dateBr}</strong>

<span class="day-total" style="color:${dayBalance>=0?'green':'red'}">

Saldo: R$ ${dayBalance.toLocaleString('pt-BR',{minimumFractionDigits:2})}

</span>

</div>

`;

data.items.forEach(t=>{

const isInc=t.type==="entrada";

list.innerHTML+=`

<div class="transaction-item ${isInc?'item-income':'item-expense'}">

<div class="info">
<strong>${t.desc}</strong>
<span>${t.category}</span>
</div>

<div class="value" style="color:${isInc?'green':'red'}">

${isInc?'+':'-'} R$ ${t.amount.toLocaleString('pt-BR',{minimumFractionDigits:2})}

</div>

</div>

`;

});

});

document.getElementById('total-income').innerText=`R$ ${totalIncome.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
document.getElementById('total-expense').innerText=`R$ ${totalExpense.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
document.getElementById('total-balance').innerText=`R$ ${(totalIncome-totalExpense).toLocaleString('pt-BR',{minimumFractionDigits:2})}`;

}

window.onload=renderUI;

</script>

</body>
</html>
