<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porquim IA</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--primary:#3b82f6;
--income:#10b981;
--expense:#ef4444;
--border:#e2e8f0;
}

body{
font-family:Arial;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:white;
padding:25px;
border-radius:15px;
width:100%;
max-width:450px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.page{display:none}
.page.active{display:block}

input,select,button{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid var(--border);
}

button{
background:var(--primary);
color:white;
font-weight:bold;
cursor:pointer;
}

.transaction{
padding:10px;
border-left:4px solid var(--primary);
margin-bottom:5px;
background:#f8fafc;
}

</style>
</head>

<body>

<div class="container">

<div id="page-login" class="page active">
<h2>🐷 Porquim IA</h2>

<input type="email" id="login-email" placeholder="Email">
<input type="password" id="login-pass" placeholder="Senha">

<button onclick="handleLogin()">Entrar</button>

<button onclick="showPage('page-register')">Criar conta</button>
</div>

<div id="page-register" class="page">

<h2>Criar Conta</h2>

<input type="text" id="reg-name" placeholder="Nome">
<input type="email" id="reg-email" placeholder="Email">
<input type="password" id="reg-pass" placeholder="Senha">

<button onclick="handleRegister()">Cadastrar</button>

<button onclick="showPage('page-login')">Voltar</button>

</div>

<div id="page-app" class="page">

<h3>Olá <span id="display-name"></span></h3>

<button onclick="logout()">Sair</button>

<hr>

<input type="text" id="desc" placeholder="Descrição">

<input type="text" id="amount" placeholder="Valor">

<input type="date" id="date">

<select id="type">
<option value="entrada">Entrada</option>
<option value="saida">Saída</option>
</select>

<button onclick="saveTransaction()">Salvar</button>

<hr>

<div id="transaction-list"></div>

</div>

</div>

<script>

const supabaseUrl="https://rvvyuapnmkblzfrzyjbd.supabase.co"

const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3dnl1YXBubWtibHpmcnp5amJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzY5OTgsImV4cCI6MjA4ODkxMjk5OH0.5AVdkXHarr1puj_0ZXdpR0zj74j7CVtRnQd35fF2kp8"

const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey)

let currentUser=null
let transactions=[]

function showPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

}

async function handleRegister(){

const name=document.getElementById("reg-name").value
const email=document.getElementById("reg-email").value
const pass=document.getElementById("reg-pass").value

if(!name||!email||!pass){
alert("Preencha tudo")
return
}

const {error}=await supabaseClient

.from("usuarios")

.insert([{name,email,pass}])

if(error){

alert("Erro ao cadastrar")

console.log(error)

}else{

alert("Conta criada")

showPage("page-login")

}

}

async function handleLogin(){

const email=document.getElementById("login-email").value
const pass=document.getElementById("login-pass").value

const {data,error}=await supabaseClient

.from("usuarios")

.select("*")

.eq("email",email)

.eq("pass",pass)

.single()

if(error||!data){

alert("Login inválido")

}else{

currentUser=data

initApp()

}

}

function logout(){

currentUser=null

showPage("page-login")

}

async function initApp(){

document.getElementById("display-name").innerText=currentUser.name

document.getElementById("date").valueAsDate=new Date()

showPage("page-app")

loadTransactions()

}

async function saveTransaction(){

const desc=document.getElementById("desc").value

const amount=parseFloat(document.getElementById("amount").value)

const date=document.getElementById("date").value

const type=document.getElementById("type").value

if(!desc||!amount||!date){

alert("Dados inválidos")

return

}

await supabaseClient

.from("transacoes")

.insert([{

email:currentUser.email,

descricao:desc,

amount,

date,

type

}])

loadTransactions()

}

async function loadTransactions(){

const {data}=await supabaseClient

.from("transacoes")

.select("*")

.eq("email",currentUser.email)

transactions=data||[]

renderUI()

}

function renderUI(){

const list=document.getElementById("transaction-list")

list.innerHTML=""

transactions.forEach(t=>{

const div=document.createElement("div")

div.className="transaction"

div.innerHTML=

t.descricao+" - R$ "+t.amount

list.appendChild(div)

})

}

</script>

</body>
</html>
